name: Release

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTC_WRAPPER: "sccache"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: [self-hosted, linux, X64]
            artifact: irl-linux-amd64
          - name: macos-aarch64
            os: [self-hosted, macOS, ARM64]
            artifact: irl-macos-aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libasound2-dev libpipewire-0.3-dev libjack-jackd2-dev libspa-0.2-dev libclang-dev \
            libegl-dev libgbm-dev libdrm-dev libfontconfig-dev \
            libva-dev nasm 

      - name: Build release binary
        run: cargo build --locked --profile release-dist -p iroh-live-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release-dist/irl

  publish:
    name: Publish rolling release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare binaries
        run: |
          mkdir -p release
          for dir in release-assets/irl-*; do
            name="$(basename "$dir")"
            cp "$dir/irl" "release/$name"
            chmod +x "release/$name"
          done

      - name: Generate checksums
        working-directory: release
        run: sha256sum irl-* > SHA256SUMS

      - name: Ensure rolling release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the release if it doesn't exist yet. If it does,
          # this is a no-op. We never delete — other CI jobs (aarch64
          # zigbuild) may have already uploaded assets to it.
          git tag -f rolling-release HEAD
          git push -f origin rolling-release
          gh release create rolling-release \
            --title "Development build" \
            --latest 2>/dev/null || true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Upload binaries + checksums, replacing any existing ones.
          for f in release/*; do
            gh release upload rolling-release "$f" --clobber
          done

      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          gh release edit rolling-release \
            --title "Development build" \
            --latest \
            --prerelease=false \
            --notes "$(cat <<NOTES
          Rolling development build from \`main\` branch.

          **Commit:** ${{ github.sha }}
          **Built:** ${BUILD_DATE}

          ### Platforms
          - **irl-linux-amd64**: Ubuntu 24.04, glibc 2.39
          - **irl-macos-aarch64**: macOS 14, Apple Silicon
          - **irl-linux-aarch64**: cross-compiled via zigbuild, glibc 2.36, Raspberry Pi OS compatible
          NOTES
          )"
