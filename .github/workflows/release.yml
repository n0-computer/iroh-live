name: Release

on:
  push:
    branches: [dev]  # TODO: change to main after merge

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  prepare-release:
    name: Prepare rolling release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create or reset rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          # Delete existing rolling release if present
          gh release delete rolling-release --yes 2>/dev/null || true
          git tag -f rolling-release HEAD
          git push -f origin rolling-release

          gh release create rolling-release \
            --title "Development build" \
            --notes "$(cat <<EOF
          Rolling development build from \`dev\` branch.

          **Commit:** ${{ github.sha }}
          **Built:** ${BUILD_DATE}

          ### Platform notes
          - **linux-amd64**: Ubuntu 24.04, glibc 2.39
          - **linux-aarch64**: Ubuntu 24.04 ARM, glibc 2.39
          - **macos-aarch64**: macOS 14, Apple Silicon

          ### Included features
          All codecs (H.264, Opus, AV1), PipeWire capture, wgpu rendering,
          VAAPI hardware encoding (Linux), VideoToolbox (macOS).
          EOF
          )" \
            --prerelease

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            artifact: irl-linux-amd64
          - name: linux-aarch64
            os: ubuntu-latest-arm
            artifact: irl-linux-aarch64
          - name: macos-aarch64
            os: macos-14
            artifact: irl-macos-aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.name }}

      - name: Install system deps (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libasound2-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev \
            libegl-dev libgbm-dev libdrm-dev libfontconfig-dev \
            libva-dev nasm

      - name: Install system deps (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install libtool automake

      - name: Build release binary
        run: cargo build --locked --release -p iroh-live-cli --all-features

      - name: Upload to rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp target/release/irl "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"
          gh release upload rolling-release "${{ matrix.artifact }}" --clobber

  finalize:
    name: Add checksums
    needs: [prepare-release, build]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release
          cd release
          # Download whatever assets made it to the release
          gh release download rolling-release --pattern 'irl-*' || true
          if ls irl-* 1>/dev/null 2>&1; then
            sha256sum irl-* > SHA256SUMS
            gh release upload rolling-release SHA256SUMS --clobber
          fi
