name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # Weekly check for excluded workspace members (moq-media-dioxus).
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            install: >
              sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 &&
              sudo apt-get update && sudo apt-get install -y --no-install-recommends
              libasound2-dev libpipewire-0.3-dev libclang-dev
              libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
              libva-dev nasm
            cargo-args: "--workspace"
            run-tests: true
            run-fmt: true
          - name: macOS
            os: macos-latest
            install: brew install libtool automake
            cargo-args: "--workspace --exclude pi-zero-demo"
            run-tests: true
            run-fmt: false
          # - name: Windows
          #   os: windows-latest
          #   install: echo "no extra deps"
          #   run-tests: false
          #   run-fmt: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: ${{ matrix.install }}

      - run: cargo check --locked ${{ matrix.cargo-args }} --all-targets --all-features
      - run: cargo check --locked ${{ matrix.cargo-args }} --all-targets --no-default-features
      - run: cargo clippy --locked ${{ matrix.cargo-args }} --all-targets -- -D warnings
      - if: ${{ matrix.run-tests }}
        run: cargo test --locked ${{ matrix.cargo-args }}
      - if: ${{ matrix.run-fmt }}
        run: cargo fmt --check

  # moq-media-dioxus is excluded from default-members (heavy dep tree).
  # Check it weekly to catch breakage early.
  check-dioxus:
    name: Check moq-media-dioxus
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[check-dioxus]')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install system deps
        run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libasound2-dev libpipewire-0.3-dev libclang-dev
          libegl-dev libgbm-dev libdrm-dev libfontconfig-dev nasm
      - run: cargo check --locked -p moq-media-dioxus

  e2e-browser:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: >
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 &&
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libasound2-dev libpipewire-0.3-dev libclang-dev
          libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
          libva-dev nasm

      # Pre-build so compilation doesn't eat into test timeouts.
      - name: Build relay + examples
        run: |
          cargo build --locked -p iroh-live-relay
          cargo build --locked --example publish --example subscribe_test

      - name: Build relay web assets
        working-directory: iroh-live-relay/web
        run: npm ci && npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        working-directory: tests/e2e-browser
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/e2e-browser
        run: npx playwright test --workers=1
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/e2e-browser/test-results/
