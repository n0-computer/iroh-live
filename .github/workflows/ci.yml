name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: Check, Test, Clippy, Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libpipewire-0.3-dev libclang-dev
          libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
          nasm

      - run: cargo check --locked --workspace --all-targets
      - run: cargo test --locked --workspace
      - run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - run: cargo fmt --check

  e2e-browser:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libpipewire-0.3-dev libclang-dev
          libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
          nasm

      # Pre-build so compilation doesn't eat into test timeouts.
      - name: Build relay + examples
        run: |
          cargo build --locked -p iroh-live-relay
          cargo build --locked --example publish --example subscribe_test

      - name: Build relay web assets
        working-directory: iroh-live-relay/web
        run: npm ci && npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        working-directory: tests/e2e-browser
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/e2e-browser
        run: npx playwright test --workers=1
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/e2e-browser/test-results/

  hw-accel:
    name: HW Accel (${{ matrix.name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS VideoToolbox
            os: macos-latest
            install: brew install libtool automake
            check-features: videotoolbox
            check-pkg: moq-media
          - name: Linux VAAPI
            os: ubuntu-latest
            install: >
              sudo apt-get update && sudo apt-get install -y
              libva-dev vainfo mesa-va-drivers libtool automake
              libpipewire-0.3-dev libclang-dev libasound2-dev
              libegl-dev libgbm-dev libdrm-dev libfontconfig-dev nasm
            check-features: vaapi
            check-pkg: moq-media
          - name: Windows MF
            os: windows-latest
            install: echo "no extra deps"
            check-features: media-foundation
            check-pkg: rusty-codecs
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: ${{ matrix.install }}
      - run: cargo check --locked -p ${{ matrix.check-pkg }} --features ${{ matrix.check-features }}
      - run: cargo clippy --locked -p ${{ matrix.check-pkg }} --features ${{ matrix.check-features }} -- -D warnings
