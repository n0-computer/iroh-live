name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  check:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            install: >
              sudo apt-get update && sudo apt-get install -y --no-install-recommends
              libasound2-dev libpipewire-0.3-dev libclang-dev
              libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
              libva-dev nasm
            run-tests: true
            run-fmt: true
          - name: macOS
            os: macos-latest
            install: brew install libtool automake
            run-tests: true
            run-fmt: false
          # - name: Windows
          #   os: windows-latest
          #   install: echo "no extra deps"
          #   run-tests: false
          #   run-fmt: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: ${{ matrix.install }}

      - run: cargo check --locked --workspace --all-targets --all-features
      - run: cargo check --locked --workspace --all-targets --no-default-features
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - if: ${{ matrix.run-tests }}
        run: cargo test --locked --workspace
      - if: ${{ matrix.run-fmt }}
        run: cargo fmt --check

  e2e-browser:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: >
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libasound2-dev libpipewire-0.3-dev libclang-dev
          libegl-dev libgbm-dev libdrm-dev libfontconfig-dev
          libva-dev nasm

      # Pre-build so compilation doesn't eat into test timeouts.
      - name: Build relay + examples
        run: |
          cargo build --locked -p iroh-live-relay
          cargo build --locked --example publish --example subscribe_test

      - name: Build relay web assets
        working-directory: iroh-live-relay/web
        run: npm ci && npm run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        working-directory: tests/e2e-browser
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/e2e-browser
        run: npx playwright test --workers=1
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/e2e-browser/test-results/
