name: CI (aarch64)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-check:
    name: Cross-check aarch64
    runs-on: [self-hosted, linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Docker image
        run: docker build -t iroh-live-cross-aarch64 -f cross/Dockerfile.aarch64 .

      # Check all default workspace members. moq-media-dioxus is excluded
      # (not a default member — heavy deps, prototype quality). The Android
      # demo and moq-media-android gate their deps behind cfg(target_os =
      # "android") so they compile fine but produce near-empty crates.
      # gpu-debug is not a workspace member and is excluded automatically.
      - name: Cross check (default features)
        run: |
          cross check --target aarch64-unknown-linux-gnu \
            -p iroh-live \
            -p iroh-moq \
            -p moq-media \
            -p moq-media-egui \
            -p moq-media-android \
            -p rusty-codecs \
            -p rusty-capture \
            -p iroh-live-cli \
            -p iroh-live-relay \
            -p headless-demo \
            -p opengl-viewer \
            -p pi-zero-demo

      # Check with additional feature flags that matter for aarch64 (VAAPI,
      # V4L2, wgpu, PipeWire). These pull in extra native deps.
      - name: Cross check (extended features)
        run: |
          cross check --target aarch64-unknown-linux-gnu \
            -p rusty-codecs --features "vaapi,v4l2,wgpu,raspberry-pi"

      - name: Cross check (V4L2 + PipeWire capture)
        run: |
          cross check --target aarch64-unknown-linux-gnu \
            -p rusty-capture --features "v4l2,pipewire"
