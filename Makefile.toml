# Use cargo-make to run tasks here: https://crates.io/crates/cargo-make

[tasks.format]
workspace = false
command = "cargo"
args = [
     "fmt",
     "--all",
     "--",
     "--config",
     "unstable_features=true",
     "--config",
     "imports_granularity=Crate,group_imports=StdExternalCrate,reorder_imports=true,format_code_in_doc_comments=true",
]

[tasks.format-check]
workspace = false
command = "cargo"
args = [
     "fmt",
     "--all",
     "--check",
     "--",
     "--config",
     "unstable_features=true",
     "--config",
     "imports_granularity=Crate,group_imports=StdExternalCrate,reorder_imports=true,format_code_in_doc_comments=true",
]

# ── CI-equivalent checks ─────────────────────────────────────────────

[tasks.check-all-features]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets", "--all-features"]

[tasks.check-no-default]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets", "--no-default-features"]

[tasks.check-default-features]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets"]

[tasks.check]
description = "cargo check: all features, no-default-features, and default features"
workspace = false
dependencies = ["check-all-features", "check-no-default", "check-default-features"]

[tasks.clippy-all-features]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features"]

[tasks.clippy-no-default]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--no-default-features"]

[tasks.clippy-default-features]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets"]

[tasks.clippy]
description = "clippy: all features, no-default-features, and default features"
workspace = false
dependencies = ["clippy-all-features", "clippy-no-default", "clippy-default-features"]

[tasks.clippy-all-features-deny]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.check-all]
description = "Full check suite: cargo check (3 configs), clippy (3 configs, deny on all-features), fmt"
workspace = false
dependencies = [
    "check-all-features",
    "check-no-default",
    "check-default-features",
    "clippy-all-features-deny",
    "clippy-no-default",
    "clippy-default-features",
    "format-check",
]

[tasks.test]
description = "Run workspace tests via nextest (serializes patchbay tests)"
workspace = false
command = "cargo"
args = ["nextest", "run", "--locked", "--workspace"]

[tasks.test-patchbay]
description = "Run patchbay network simulation tests (including ignored)"
workspace = false
command = "cargo"
args = ["nextest", "run", "--locked", "-p", "iroh-live",
        "-E", "binary(patchbay)", "--run-ignored", "all"]

[tasks.test-e2e-browser]
description = "Run Playwright browser E2E tests (requires npm ci in tests/e2e-browser)"
workspace = false
cwd = "tests/e2e-browser"
command = "npx"
args = ["playwright", "test", "--workers=1"]

[tasks.test-full]
description = "Full CI-equivalent test suite: fmt, clippy, all tests, patchbay, browser E2E"
workspace = false
dependencies = ["format-check", "check", "clippy", "test"]
