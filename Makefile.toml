# Use cargo-make to run tasks here: https://crates.io/crates/cargo-make

[tasks.format]
workspace = false
command = "cargo"
args = [
     "fmt",
     "--all",
     "--",
     "--config",
     "unstable_features=true",
     "--config",
     "imports_granularity=Crate,group_imports=StdExternalCrate,reorder_imports=true,format_code_in_doc_comments=true",
]

[tasks.format-check]
workspace = false
command = "cargo"
args = [
     "fmt",
     "--all",
     "--check",
     "--",
     "--config",
     "unstable_features=true",
     "--config",
     "imports_granularity=Crate,group_imports=StdExternalCrate,reorder_imports=true,format_code_in_doc_comments=true",
]

# ── CI-equivalent checks ─────────────────────────────────────────────

[tasks.check-all-features]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets", "--all-features"]

[tasks.check-no-default]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets", "--no-default-features"]

[tasks.check-default-features]
workspace = false
command = "cargo"
args = ["check", "--locked", "--workspace", "--all-targets"]

[tasks.check]
description = "cargo check: all features, no-default-features, and default features"
workspace = false
dependencies = ["check-all-features", "check-no-default", "check-default-features"]

[tasks.clippy-all-features]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.clippy-no-default]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--no-default-features", "--", "-D", "warnings"]

[tasks.clippy-default-features]
workspace = false
command = "cargo"
args = ["clippy", "--locked", "--workspace", "--all-targets", "--", "-D", "warnings"]

[tasks.clippy]
description = "clippy with -D warnings: all features, no-default-features, and default features"
workspace = false
dependencies = ["clippy-all-features", "clippy-no-default", "clippy-default-features"]

[tasks.check-all]
description = "Full pre-commit check: cargo check (3 configs), clippy -D warnings (3 configs), fmt"
workspace = false
dependencies = [
    "check-all-features",
    "check-no-default",
    "check-default-features",
    "clippy-all-features",
    "clippy-no-default",
    "clippy-default-features",
    "format-check",
]

# ── Tests ─────────────────────────────────────────────────────────────

[tasks.test]
description = "Run workspace tests via nextest (serializes patchbay tests)"
workspace = false
command = "cargo"
args = ["nextest", "run", "--locked", "--workspace"]

[tasks.test-patchbay]
description = "Run patchbay network simulation tests (including ignored)"
workspace = false
command = "cargo"
args = ["nextest", "run", "--locked", "-p", "iroh-live",
        "-E", "binary(patchbay)", "--run-ignored", "all"]

# ── E2E browser tests ────────────────────────────────────────────────

[tasks.e2e-prebuild]
description = "Pre-build binaries needed by Playwright E2E tests"
workspace = false
script = [
    "cargo build --locked -p iroh-live-relay -p iroh-live-cli && cargo build --locked -p iroh-live --example subscribe_test",
]

[tasks.test-e2e]
description = "Run Playwright browser E2E tests"
workspace = false
dependencies = ["e2e-prebuild"]
cwd = "tests/e2e-browser"
command = "npx"
args = ["playwright", "test", "--workers=1"]

[tasks.test-full]
description = "Full CI-equivalent test suite: check-all, tests, browser E2E"
workspace = false
dependencies = ["check-all", "test", "test-e2e"]

# ── Cross-compilation (aarch64, Docker via cross-rs) ─────────────────

[tasks.cross-check-aarch64]
description = "Cross-check workspace for aarch64"
workspace = false
command = "cross"
args = ["check", "--target", "aarch64-unknown-linux-gnu", "--workspace", "--exclude", "bevy-demo", "--exclude", "bevy-call", "--exclude", "gpu-debug"]

[tasks.cross-build-irl-aarch64]
description = "Cross-build irl CLI for aarch64"
workspace = false
command = "cross"
args = ["build", "--release", "--target", "aarch64-unknown-linux-gnu", "-p", "iroh-live-cli"]

[tasks.cross-build-pi-zero-aarch64]
description = "Cross-build pi-zero demo for aarch64"
workspace = false
command = "cross"
args = ["build", "--release", "--target", "aarch64-unknown-linux-gnu", "-p", "pi-zero-demo", "--features", "raspberry-pi"]

# ── Cross-compilation (aarch64, zigbuild + sysroot) ──────────────────
# Requires: zig, cargo-zigbuild, sysroot (run `./cross/create-sysroot.sh`)
# These targets use a Debian Bookworm sysroot instead of Docker, giving
# access to libcamera-dev, modern PipeWire, and other libraries not
# available in the cross-rs Ubuntu 20.04 base image.

[tasks.zig-create-sysroot]
description = "Create aarch64 Debian Bookworm sysroot for zigbuild"
workspace = false
script = ["${CARGO_MAKE_WORKING_DIRECTORY}/cross/create-sysroot.sh"]

[tasks.zig-check-aarch64]
description = "Cross-check workspace for aarch64 via zigbuild"
workspace = false
script = [
    "${CARGO_MAKE_WORKING_DIRECTORY}/cross/zigbuild.sh --workspace --exclude bevy-demo --exclude bevy-call --exclude gpu-debug"
]

[tasks.zig-build-irl]
description = "Cross-build irl CLI for aarch64 via zigbuild"
workspace = false
script = [
    "${CARGO_MAKE_WORKING_DIRECTORY}/cross/zigbuild.sh -p iroh-live-cli --release"
]

[tasks.zig-build-pi-zero]
description = "Cross-build pi-zero demo for aarch64 via zigbuild"
workspace = false
script = [
    "${CARGO_MAKE_WORKING_DIRECTORY}/cross/zigbuild.sh -p pi-zero-demo --release"
]

[tasks.zig-deploy-pi-zero]
description = "Cross-build and deploy pi-zero demo via zigbuild"
workspace = false
env = { PI_HOST = { value = "livepizero", condition = { env_not_set = ["PI_HOST"] } } }
script = [
    '''
    ${CARGO_MAKE_WORKING_DIRECTORY}/cross/zigbuild.sh -p pi-zero-demo --release
    BINARY="target/aarch64-unknown-linux-gnu/release/pi-zero-demo"
    aarch64-linux-gnu-strip "$BINARY" 2>/dev/null || echo "note: strip not available, deploying unstripped"
    scp "$BINARY" "pi@${PI_HOST}:~/pi-zero-demo"
    echo "deployed: pi@${PI_HOST}:~/pi-zero-demo"
    '''
]
