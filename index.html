<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iroh-live docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      min-height: 100vh;
    }
    nav {
      width: 240px;
      min-width: 240px;
      background: #161b22;
      border-right: 1px solid #30363d;
      padding: 16px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
    }
    nav h2 {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 16px 8px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    nav a {
      display: block;
      padding: 5px 16px;
      color: #e6edf3;
      text-decoration: none;
      font-size: 14px;
      border-left: 3px solid transparent;
    }
    nav a:hover { background: #21262d; }
    nav a.active { background: #1c2633; border-left-color: #58a6ff; font-weight: 600; }
    nav .sep { height: 1px; background: #30363d; margin: 8px 16px; }
    nav .sep-thick { height: 2px; background: #58a6ff33; margin: 12px 16px; }
    nav .group-label {
      font-size: 11px;
      font-weight: 600;
      padding: 8px 16px 4px;
      color: #6e7681;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    main {
      margin-left: 240px;
      flex: 1;
      max-width: 900px;
      padding: 32px 40px;
    }
    .markdown-body { font-size: 16px; }
    #error { color: #f85149; display: none; }
    @media (max-width: 768px) {
      nav { position: static; width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid #30363d; display: flex; flex-wrap: wrap; padding: 8px; }
      nav h2 { width: 100%; }
      nav a { border-left: none; padding: 4px 8px; font-size: 13px; }
      nav .sep, nav .sep-thick { display: none; }
      nav .group-label { width: 100%; }
      body { flex-direction: column; }
      main { margin-left: 0; padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <nav id="sidebar"></nav>
  <main>
    <div id="error"></div>
    <article class="markdown-body" id="content"><p style="color:#8b949e">Loading...</p></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    const readmeEntries = [
      { path: 'README.md', label: 'iroh-live (root)' },
      null,
      { path: 'iroh-live/README.md', label: 'iroh-live' },
      { path: 'iroh-moq/README.md', label: 'iroh-moq' },
      { path: 'moq-media/README.md', label: 'moq-media' },
      { path: 'rusty-codecs/README.md', label: 'rusty-codecs' },
      { path: 'rusty-capture/README.md', label: 'rusty-capture' },
      null,
      { path: 'moq-media-egui/README.md', label: 'moq-media-egui' },
      { path: 'moq-media-android/README.md', label: 'moq-media-android' },
      { path: 'moq-media-dioxus/README.md', label: 'moq-media-dioxus' },
      { path: 'iroh-live-relay/README.md', label: 'iroh-live-relay' },
      null,
      { path: 'demos/android/README.md', label: 'demos/android' },
      { path: 'demos/pi-zero/README.md', label: 'demos/pi-zero' },
      null,
      { path: 'blogpost.md', label: 'Blog post' },
      { path: 'docpage.md', label: 'Docs page' },
    ];

    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('content');
    const errorEl = document.getElementById('error');

    // Parse docs/index.md to build the docs sidebar entries
    function parseDocsIndex(text) {
      const entries = [];
      const linkRe = /\[([^\]]+)\]\(([^)]+)\)/g;
      for (const line of text.split('\n')) {
        const trimmed = line.trim();
        // Detect ## and ### headers as group labels
        if (trimmed.startsWith('## ')) {
          entries.push({ group: trimmed.slice(3).trim() });
          continue;
        }
        if (trimmed.startsWith('### ')) {
          entries.push({ group: trimmed.slice(4).trim() });
          continue;
        }
        // Extract all [label](path) links from table rows
        let m;
        linkRe.lastIndex = 0;
        while ((m = linkRe.exec(line)) !== null) {
          const label = m[1];
          const path = m[2];
          if (path.endsWith('.md')) {
            entries.push({ path: 'docs/' + path, label: label });
          }
        }
      }
      return entries;
    }

    function buildDocsSidebar(entries) {
      const docsHeading = document.createElement('h2');
      docsHeading.textContent = 'Docs';
      sidebar.appendChild(docsHeading);

      entries.forEach(entry => {
        if (entry.group) {
          const label = document.createElement('div');
          label.className = 'group-label';
          label.textContent = entry.group;
          sidebar.appendChild(label);
          return;
        }
        const a = document.createElement('a');
        a.href = '#' + entry.path;
        a.dataset.path = entry.path;
        a.textContent = entry.label;
        sidebar.appendChild(a);
      });
    }

    function buildReadmesSidebar() {
      // Thick separator between docs and READMEs
      const thickSep = document.createElement('div');
      thickSep.className = 'sep-thick';
      sidebar.appendChild(thickSep);

      const readmeHeading = document.createElement('h2');
      readmeHeading.textContent = 'READMEs';
      sidebar.appendChild(readmeHeading);

      readmeEntries.forEach(f => {
        if (!f) {
          const sep = document.createElement('div');
          sep.className = 'sep';
          sidebar.appendChild(sep);
          return;
        }
        const a = document.createElement('a');
        a.href = '#' + f.path;
        a.dataset.path = f.path;
        a.textContent = f.label;
        sidebar.appendChild(a);
      });
    }

    async function loadFile(path) {
      sidebar.querySelectorAll('a').forEach(a => {
        a.classList.toggle('active', a.dataset.path === path);
      });

      errorEl.style.display = 'none';
      content.innerHTML = '<p style="color:#8b949e">Loading...</p>';

      try {
        const resp = await fetch(path);
        if (!resp.ok) throw new Error('Failed to load ' + path + ': ' + resp.status);
        let md = await resp.text();

        // Resolve relative links: rewrite [text](relative.md) to hash links
        const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/') + 1) : '';
        md = md.replace(/\]\(([^)]+)\)/g, (match, href) => {
          if (href.startsWith('http') || href.startsWith('#') || href.startsWith('mailto:')) return match;
          if (href.endsWith('.md') || href.includes('/README.md')) {
            const resolved = dir ? normalizePath(dir + href) : href;
            return '](#' + resolved + ')';
          }
          if (!href.startsWith('/') && dir) {
            return '](' + dir + href + ')';
          }
          return match;
        });

        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = '';
        errorEl.style.display = 'block';
        errorEl.textContent = e.message;
      }
    }

    function normalizePath(p) {
      const parts = [];
      for (const seg of p.split('/')) {
        if (seg === '..') parts.pop();
        else if (seg !== '.') parts.push(seg);
      }
      return parts.join('/');
    }

    function onHashChange() {
      const hash = decodeURIComponent(window.location.hash.slice(1)) || 'docs/guide/index.md';
      loadFile(hash);
    }

    // Initialize: fetch docs/index.md, parse it, build sidebar, then load content
    fetch('docs/index.md')
      .then(resp => resp.ok ? resp.text() : Promise.reject(new Error('Failed to load docs/index.md')))
      .then(text => {
        const docsEntries = parseDocsIndex(text);
        buildDocsSidebar(docsEntries);
        buildReadmesSidebar();
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
      })
      .catch(err => {
        // Fallback: still show READMEs even if index.md fails
        const docsHeading = document.createElement('h2');
        docsHeading.textContent = 'Docs';
        sidebar.appendChild(docsHeading);
        const errDiv = document.createElement('div');
        errDiv.className = 'group-label';
        errDiv.textContent = 'Failed to load index';
        sidebar.appendChild(errDiv);
        buildReadmesSidebar();
        window.addEventListener('hashchange', onHashChange);
        onHashChange();
      });
  </script>
</body>
</html>
